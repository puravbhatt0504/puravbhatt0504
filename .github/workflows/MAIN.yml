name: GitHub Snake Game

on:
  # Schedule the workflow to run daily at midnight UTC
  schedule:
    - cron: "0 0 * * *"  # Fixed: was "0 0 * **"

  # Allow manual triggering of the workflow
  workflow_dispatch:

  # Trigger the workflow on pushes to the main branch
  push:
    branches:
      - main

permissions:
  contents: write  # Required to push generated SVGs to output branch

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4  # Updated to v4

      # Step 2: Generate the snake animations (svg-only is faster)
      - name: Generate GitHub Contributions Snake Animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Generate streak stats (self-hosted - avoids public API rate limits)
      - name: Generate Streak Stats
        uses: muhammad-fiaz/github-readme-streak-stats@v1.0.1
        with:
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME: tokyonight
          OUTPUT_PATH: dist/github-streak-stats.svg
          HIDE_BORDER: "true"

      # Step 4: Generate profile views counter (requires TRAFFIC_TOKEN secret - see SETUP.md)
      - name: Generate Profile Views Badge
        id: traffic
        uses: yi-Xu-0100/traffic-to-badge@v1.4.0
        with:
          # Add TRAFFIC_TOKEN secret (PAT with repo scope) for reliable counts - see SETUP.md
          my_token: ${{ secrets.TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}
          static_list: ${{ github.repository }}
          total_views_color: "0A66C2"
          logo: github
        continue-on-error: true

      - name: Copy profile views badge to dist
        if: steps.traffic.outcome == 'success'
        run: cp "${{ steps.traffic.outputs.traffic_path }}/total_views.svg" dist/profile-views.svg

      # Step 5: Deploy to output branch
      - name: Deploy to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Update snake animation [skip ci]"
          
